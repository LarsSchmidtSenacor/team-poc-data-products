apiVersion: v3.1.0
kind: DataContract
id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
version: 1.0.0
status: active
domain: sales
dataProduct: sales-orders
description:
  purpose: Source-aligned data product for sales order transactions

servers:
  - server: local-postgres
    host: localhost
    port: 5432
    type: postgresql
    database: dpf
    schema: sales_orders_v1

schema:
  - id: sales_orders
    name: sales_orders
    physicalType: table
    description: Raw sales order transactions
    properties:
      - name: id
        logicalType: integer
        physicalType: integer
        description: Order identifier
        primaryKey: true
        primaryKeyPosition: 1
      - name: amount
        logicalType: number
        physicalType: decimal(10,2)
        description: Order amount in EUR
        quality:
          - type: library
            metric: invalidValues
            description: No negative amounts allowed
            mustBe: 0
            dimension: accuracy
            severity: error
      - name: created_at
        logicalType: timestamp
        physicalType: timestamp
        description: Order creation timestamp

slaProperties:
  - property: latency
    value: 1
    unit: d
    description: Data refreshed daily
  - property: retention
    value: 3
    unit: y
