apiVersion: v3.1.0
kind: DataContract
id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
version: 1.0.0
status: active
domain: sales
dataProduct: sales-orders
description: Source-aligned data product for sales order transactions
owner: dpf-team

servers:
  - id: local-postgres
    server: localhost
    host: localhost
    port: 5432
    type: postgresql
    database: dpf
    schema: sales_orders_v1
    environment: production

schema:
  - id: sales_orders
    name: sales_orders
    type: table
    description: Raw sales order transactions
    properties:
      - name: id
        type: integer
        description: Order identifier
        primaryKeyPosition: 1
      - name: amount
        type: number
        description: Order amount in EUR
      - name: created_at
        type: timestamp
        description: Order creation timestamp

quality:
  - id: no-negative-amounts
    type: sql
    description: No negative amounts allowed
    property: invalidValues
    element: sales_orders.amount
    mustBe: 0

slaProperties:
  - property: latency
    value: 1
    unit: day
    description: Data refreshed daily
  - property: retention
    value: 3
    unit: years
