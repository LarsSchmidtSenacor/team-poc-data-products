apiVersion: v3.1.0
kind: DataContract
id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
version: 1.0.0
status: active
domain: sales
dataProduct: sales-orders
description:
  purpose: Source-aligned data product for sales order transactions
owner: dpf-team

servers:
  - server: local-postgres
    host: localhost
    port: 5432
    type: postgresql
    database: dpf
    schema: sales_orders_v1
    environment: production

schema:
  - id: sales_orders
    name: sales_orders
    physicalType: table
    description: Raw sales order transactions
    properties:
      - name: id
        logicalType: integer
        physicalType: integer
        description: Order identifier
        primaryKey: true
        primaryKeyPosition: 1
      - name: amount
        logicalType: number
        physicalType: decimal(10,2)
        description: Order amount in EUR
      - name: created_at
        logicalType: timestamp
        physicalType: timestamp
        description: Order creation timestamp

quality:
  - id: no-negative-amounts
    type: library
    metric: invalidValues
    description: No negative amounts allowed
    element: sales_orders.amount
    mustBe: 0
    dimension: accuracy
    severity: error

slaProperties:
  - property: latency
    value: 1
    unit: d
    description: Data refreshed daily
  - property: retention
    value: 3
    unit: y
