name: DPF Pipeline

on:
  push:
    branches: [main, master]

jobs:
  lint:
    name: Lint Data Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install datacontract CLI
        run: pip install datacontract-cli

      - name: Lint contract
        run: datacontract lint contract.yaml
